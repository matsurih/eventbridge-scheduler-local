services:
  scheduler:
    build: .
    ports:
      - "4590:4590"
    environment:
      PORT: 4590
      DB_PATH: /data/scheduler.db
      SCHEDULER_SQS_ENDPOINT: http://localstack:4566
      SCHEDULER_LAMBDA_ENDPOINT: http://localstack:4566
      NODE_ENV: development
    volumes:
      - scheduler-data:/data

volumes:
  scheduler-data:
